<body id="stat-block-body" style="min-width: 1000px;">
<div class="hidden" id="dragndrop-overlay">
<div>
<span class="fa fa-sign-in-alt fa-rotate-90"></span><br/>
            放在这里
        </div>
</div>
<div class="container" style="text-align: center;">
<div class="content">
<a href="dnd-statblock.html"><img class="statblock-image" src="dndimages/edit-icon.png"/> 返回属性栏编辑器</a>
<h1>统计块打印</h1>
<p>在一张纸上打印多个角色统计信息块。</p>
<button onclick="$('#file-upload').click()">加载统计块...</button> 或拖放
            <input hidden="" id="file-upload" multiple="" onchange="ZZEVENT934ZZ" type="file"/>
<div id="monster-select-form">SRD/百兽之书 属性块： 
                <select id="monster-select">
<option value="">-选择-</option>
</select>
<button id="monster-select-button" onclick="loadPreset()" type="button">Add</button>
</div>
<div style="text-align: left; padding-bottom: 25px;">
<h3>包含的统计栏：</h3>
<ul id="statblocks-list"></ul>
</div>
<h3>预览</h3>
<p><b><i>注意：</i></b> 此预览未显示实际打印结果的比例和页面布局。按下“打印”后，请使用浏览器打印对话框中的比例选项。</p>
<p><b><i>提示：</i></b> 您可以在浏览器的打印对话框中切换战力条的背景图形。
            </p>
<div id="print-options">
<input id="monochrome-print-input" onchange="refresh()" type="checkbox"/>
<label for="monochrome-print-input">单色统计块：</label>
<br/>
<input checked="" id="save-paper-input" onchange="refresh()" type="checkbox"/>
<label for="save-paper-input">将两个相邻的单列统计栏并排排列</label>
<br/>
<input checked="" id="print-margin-check-input" onchange="refresh()" type="checkbox"/>
<label for="print-margin-check-input">统计块之间的边距： </label>
<input id="print-margin-input" onchange="refresh()" type="text" value="0.2in"/>
<span class="tooltip">?<span class="tooltiptext">所有 CSS 单位如 "cm"、"mm"、"in"、"pt"、"px"... 均受支持。<br/>See <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/length#absolute_length_units" target="_blank">mdn web 文档 <span class="fa fa-external-link-alt fa-sm"></span></a> 详见。</span></span>
<br/>
<button onclick="printBlocks()">打印</button>
</div>
<div id="print-preview-page">
<div id="print-preview">
</div>
</div>
</div>

<body id="nft-gen-body">
<div class="container">
<div class="content">
<h1 class="centered-element">免费NFT生成器</h1>
<br/>
<div>
<label>
<div class="input-label">输入一个唯一标识符： </div>
<div><input class="form-control" id="id-input" onchange="setButtonValidity()" type="text"/>
</div>
</label>
</div>
<div class="error-text" id="invalid-id" style="display: none;">无效标识符</div>
<br/>
<div>
<label>
<div class="input-label">输入一个URL： </div>
<div><input class="form-control" id="url-input" onchange="setButtonValidity()" type="text"/>
</div>
</label>
</div>
<div class="error-text" id="invalid-url" style="display: none;">无效的URL</div>
<br/>
<div class="centered-element">
<button class="btn btn-secondary" id="generate-button" onclick="generate()">生成我的 NFT</button>
</div>
<br/>
<div id="generating-value" style="display: none;">
				生成值中...
			</div>
<div id="your-nft" style="display: none;">
<div>
<label>
<div class="input-label">您的NFT: </div>
<div><input class="form-control" id="nft-input" onclick="this.setSelectionRange(0, this.value.length)" readonly="" type="text"/></div>
</label>
</div>
<div>
<div><b>该NFT的大致价值为：</b></div>
<br/>
<div id="nft-value">$<span id="nft-value-number"></span> 百万美金</div>
</div>
</div>
